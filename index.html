<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="form-container">
    <h2>Form Kehadiran Praktikan</h2>
    <form>
        <div class="form-group">
            <label>Nama:</label>
            <input type="text" placeholder="Masukkan Nama">
        </div>
        
        <div class="form-group">
            <label>NPM:</label>
            <input type="text" placeholder="Masukkan NPM">
        </div>

        <div class="form-group">
            <label>Kelas:</label>
            <select>
                <option value="">Pilih Kelas</option>
                <option value="A">Kelas Sistem Informasi</option>
                <option value="B">gapunya kelas</option>
            </select>
        </div>

        <div class="form-group">
            <label>Tanggal:</label>
            <input type="date">
        </div>

        <div class="form-group">
            <label>Waktu:</label>
            <input type="time">
        </div>

        <button type="submit">Submit</button>
    </form>
</div>
  
</body>
</html>
